name: Update Translations

on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Translation mode"
        required: false
        default: "llm-gemini"
        type: choice
        options:
          - cn-only
          - llm-qwen
          - llm-gemini
      force:
        description: "Force overwrite existing translation files"
        required: false
        default: false
        type: boolean
      category:
        description: "Optional single category (blank means full run)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-translations
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run translate.py
        shell: bash
        run: |
          set -euo pipefail

          mode="${{ github.event.inputs.mode || 'llm-gemini' }}"
          force_flag="${{ github.event.inputs.force }}"
          category="${{ github.event.inputs.category }}"
          args=()

          if [[ "$force_flag" == "true" ]]; then
            args+=("--force")
          fi

          if [[ -n "$category" ]]; then
            args+=("--category" "$category")
          fi

          case "$mode" in
            cn-only)   args+=("--cn-only") ;;
            llm-qwen)
              [[ -z "${SILICONFLOW_API_KEY:-}" ]] && { echo "SILICONFLOW_API_KEY required"; exit 1; }
              args+=("--llm" "qwen") ;;
            llm-gemini)
              [[ -z "${GEMINI_API_KEY:-}" ]] && { echo "GEMINI_API_KEY required"; exit 1; }
              args+=("--llm" "gemini") ;;
            *) echo "Unsupported mode: $mode"; exit 1 ;;
          esac

          echo "Running: python scripts/translate.py ${args[*]}"
          python scripts/translate.py "${args[@]}"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- translations/; then
            echo "No translation changes detected"
            exit 0
          fi

          git config user.name "MoeSekai Bot"
          git config user.email "bot@moesekai.com"
          git add -A translations/
          git commit -m "chore: update translations via translate.py"
          git push
